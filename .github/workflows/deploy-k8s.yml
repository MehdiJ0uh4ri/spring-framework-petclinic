# =============================================================================
# DEPLOY TO KUBERNETES (DEV)
# Triggers after "Security & Docker Build" succeeds on main.
# Deploys the app as Kubernetes pods into the remote k3s cluster
# using the KUBECONFIG_DEV secret.
# =============================================================================
name: Deploy to Kubernetes (Dev)

on:
  workflow_run:
    workflows: ["Security & Docker Build"]
    branches: [main]
    types: [completed]

env:
  NAMESPACE: petclinic
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy → k3s
    runs-on: ubuntu-22.04
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: read

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # ── Compute image tag (same SHA used during the build) ─────────────────
      - name: Compute image metadata
        id: meta
        run: |
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${REPO_LC}/petclinic" >> "$GITHUB_OUTPUT"
          echo "tag=${{ github.event.workflow_run.head_sha }}"  >> "$GITHUB_OUTPUT"

      # ── Write kubeconfig ────────────────────────────────────────────────────
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # ── Set up kubectl ───────────────────────────────────────────────────────
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      # ── Verify cluster connectivity ──────────────────────────────────────────
      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      # ── Ensure namespace exists ──────────────────────────────────────────────
      - name: Ensure namespace
        run: |
          kubectl get namespace "$NAMESPACE" 2>/dev/null \
            || kubectl create namespace "$NAMESPACE"

      # ── Create / refresh GHCR image pull secret ──────────────────────────────
      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace "$NAMESPACE" \
            --docker-server="${REGISTRY}" \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # =========================================================================
      # ⚠️ INSERT YOUR NEW DEPLOYMENT LOGIC HERE (e.g., Terraform or kubectl apply)
      # =========================================================================

      # ── Post-deploy summary ──────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 Kubernetes Status Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Namespace | \`$NAMESPACE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Target Image | \`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Pods Currently Running in Namespace" >> "$GITHUB_STEP_SUMMARY"
          kubectl get pods -n "$NAMESPACE" \
            -o custom-columns='NAME:.metadata.name,STATUS:.status.phase,READY:.status.containerStatuses[0].ready' \
            --no-headers 2>/dev/null \
            | awk '{print "| "$1" | "$2" | "$3" |"}' >> "$GITHUB_STEP_SUMMARY" || true