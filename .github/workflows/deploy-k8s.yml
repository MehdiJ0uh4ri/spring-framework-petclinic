# =============================================================================
# DEPLOY TO KUBERNETES (DEV) — plain kubectl apply (no Helm)
# Triggers after "Security & Docker Build" succeeds on main.
# Uses H2 in-memory DB (default jpa profile) — same as the working Docker setup.
# =============================================================================
name: Deploy to Kubernetes (Dev)

on:
  workflow_run:
    workflows: ["Security & Docker Build"]
    branches: [main]
    types: [completed]

env:
  NAMESPACE: petclinic
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Deploy → k3s
    runs-on: ubuntu-22.04
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: read

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # ── Compute full image name ───────────────────────────────────────────────
      - name: Compute image
        id: meta
        run: |
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${REPO_LC}/petclinic:${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      # ── Write kubeconfig ──────────────────────────────────────────────────────
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # ── Set up kubectl ────────────────────────────────────────────────────────
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      # ── Verify cluster connectivity ───────────────────────────────────────────
      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      # ── Namespace ────────────────────────────────────────────────────────────
      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      # ── GHCR pull secret ─────────────────────────────────────────────────────
      - name: Create GHCR pull secret
        run: |
          GHCR_PASSWORD="${{ secrets.GHCR_PAT }}"
          if [ -z "$GHCR_PASSWORD" ]; then
            echo "⚠️  GHCR_PAT not set, falling back to GITHUB_TOKEN"
            GHCR_PASSWORD="${{ secrets.GITHUB_TOKEN }}"
          fi
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace "$NAMESPACE" \
            --docker-server="${REGISTRY}" \
            --docker-username="${{ github.actor }}" \
            --docker-password="$GHCR_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Deploy app ───────────────────────────────────────────────────────────
      - name: Apply app deployment
        run: |
          sed 's|__IMAGE__|${{ steps.meta.outputs.image }}|g' \
            k8s/deployment.yaml | kubectl apply -f -

      - name: Apply app service
        run: kubectl apply -f k8s/service.yaml

      # ── Wait for rollout ──────────────────────────────────────────────────────
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/petclinic \
            --namespace "$NAMESPACE" --timeout=120s

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 Kubernetes Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ steps.meta.outputs.image }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Namespace | \`$NAMESPACE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| App URL | \`http://$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="ExternalIP")].address}'):30080\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Pods" >> "$GITHUB_STEP_SUMMARY"
          kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null \
            | awk '{print "| "$1" | "$4" | "$3" |"}' >> "$GITHUB_STEP_SUMMARY" || true