# =============================================================================
# DEPLOY TO KUBERNETES (DEV)
# Triggers after "Security & Docker Build" succeeds on main.
# Deploys the app as Kubernetes pods into the remote k3s cluster
# using the KUBECONFIG_DEV secret.
# =============================================================================
name: Deploy to Kubernetes (Dev)

on:
  workflow_run:
    workflows: ["Security & Docker Build"]
    branches: [main]
    types: [completed]

env:
  NAMESPACE: petclinic
  HELM_RELEASE: petclinic
  REGISTRY: ghcr.io

jobs:
  deploy:
    name: Helm Deploy → k3s
    runs-on: ubuntu-22.04
    if: github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: read
      packages: read

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # ── Compute image tag (same SHA used during the build) ─────────────────
      - name: Compute image metadata
        id: meta
        run: |
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${REPO_LC}/petclinic" >> "$GITHUB_OUTPUT"
          echo "tag=${{ github.event.workflow_run.head_sha }}"  >> "$GITHUB_OUTPUT"

      # ── Write kubeconfig ────────────────────────────────────────────────────
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      # ── Set up kubectl ───────────────────────────────────────────────────────
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      # ── Verify cluster connectivity ──────────────────────────────────────────
      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      # ── Ensure namespace exists ──────────────────────────────────────────────
      - name: Ensure namespace
        run: |
          kubectl get namespace "$NAMESPACE" 2>/dev/null \
            || kubectl create namespace "$NAMESPACE"

      # ── Create / refresh GHCR image pull secret ──────────────────────────────
      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace "$NAMESPACE" \
            --docker-server="${REGISTRY}" \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Set up Helm ──────────────────────────────────────────────────────────
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      # ── Add Bitnami repo & update dependencies ───────────────────────────────
      - name: Helm dependency update
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency update ./helm/petclinic

      # ── Deploy ───────────────────────────────────────────────────────────────
      - name: Helm upgrade --install
        run: |
          helm upgrade --install "$HELM_RELEASE" ./helm/petclinic \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --set image.repository="${{ steps.meta.outputs.image }}" \
            --set image.tag="${{ steps.meta.outputs.tag }}" \
            --set mysql.auth.rootPassword="${{ secrets.DB_PASS }}" \
            --set mysql.auth.password="${{ secrets.DB_PASS }}" \
            --set mysql.auth.username="${{ secrets.DB_USER }}" \
            --wait \
            --timeout 5m

      # ── Verify rollout ───────────────────────────────────────────────────────
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/"$HELM_RELEASE" \
            --namespace "$NAMESPACE" --timeout=120s

      # ── Post-deploy summary ──────────────────────────────────────────────────
      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 Kubernetes Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Namespace | \`$NAMESPACE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Release | \`$HELM_RELEASE\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Pods" >> "$GITHUB_STEP_SUMMARY"
          kubectl get pods -n "$NAMESPACE" \
            -o custom-columns='NAME:.metadata.name,STATUS:.status.phase,READY:.status.containerStatuses[0].ready' \
            --no-headers 2>/dev/null \
            | awk '{print "| "$1" | "$2" | "$3" |"}' >> "$GITHUB_STEP_SUMMARY" || true
