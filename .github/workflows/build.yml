# =============================================================================
# BUILD, PUSH, AND DEPLOY — Manual Trigger (workflow_dispatch)
# Fast-path: build → push → deploy to dev cluster in one run.
# =============================================================================
name: Build, Push, and Deploy to Dev

on: workflow_dispatch

env:
  NAMESPACE: petclinic
  HELM_RELEASE: petclinic
  REGISTRY: ghcr.io

jobs:
  # ── Build & Push ─────────────────────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          REPO_LC="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "image=${REGISTRY}/${REPO_LC}/petclinic" >> "$GITHUB_OUTPUT"
          echo "tag=$(git rev-parse --short HEAD)"       >> "$GITHUB_OUTPUT"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build with Maven
        run: ./mvnw -B clean package -DskipTests

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image }}:latest

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Helm Deploy → k3s
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Write kubeconfig ───────────────────────────────────────────────────
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DEV }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Verify cluster connectivity
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Ensure namespace
        run: |
          kubectl get namespace "$NAMESPACE" 2>/dev/null \
            || kubectl create namespace "$NAMESPACE"

      - name: Create GHCR pull secret
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --namespace "$NAMESPACE" \
            --docker-server="${REGISTRY}" \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GITHUB_TOKEN }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Helm dependency update
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency update ./helm/petclinic

      - name: Helm upgrade --install
        run: |
          helm upgrade --install "$HELM_RELEASE" ./helm/petclinic \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --set image.repository="${{ needs.build.outputs.image }}" \
            --set image.tag="${{ needs.build.outputs.tag }}" \
            --set mysql.auth.rootPassword="${{ secrets.DB_PASS }}" \
            --set mysql.auth.password="${{ secrets.DB_PASS }}" \
            --set mysql.auth.username="${{ secrets.DB_USER }}" \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/"$HELM_RELEASE" \
            --namespace "$NAMESPACE" --timeout=120s

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚀 Kubernetes Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image | \`${{ needs.build.outputs.image }}:${{ needs.build.outputs.tag }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Namespace | \`$NAMESPACE\` |" >> "$GITHUB_STEP_SUMMARY"
          kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null || true